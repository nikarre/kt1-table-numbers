<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>КТ №1. Таблица с генерацией чисел</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  table { border-collapse: collapse; margin-top: 15px; }
  td {
    border: 1px solid #333;
    width: 50px;
    height: 50px;
    text-align: center;
    vertical-align: middle;
  }
  .orange { background-color: orange; }
  button { margin-top: 15px; padding: 8px 16px; cursor: pointer; }
</style>
</head>
<body>

<h1>Таблица случайных чисел</h1>

<table id="numbersTable"></table>

<button onclick="addNumber()">Добавить число</button>

<script>
const COLUMNS = 6; // 6 столбцов (5 строк по 6 = 30 чисел)

// Случайное целое от 0 до 99 включительно
function randomNumber() {
  return Math.floor(Math.random() * 100);
}

// Массив из 30 случайных чисел
let numbers = [];
for (let i = 0; i < 30; i++) {
  numbers.push(randomNumber());
}

// Перерисовать таблицу по массиву numbers
function renderTable() {
  const table = document.getElementById("numbersTable");
  table.innerHTML = "";
  let row;
  for (let i = 0; i < numbers.length; i++) {
    // новая строка каждые COLUMNS ячеек
    if (i % COLUMNS === 0) {
      row = table.insertRow();
    }
    const cell = row.insertCell();
    cell.textContent = numbers[i];
    // число 50 и больше — красим ячейку в оранжевый
    if (numbers[i] >= 50) {
      cell.classList.add("orange");
    }
  }
}

// Добавить новое случайное число в таблицу (по условиям Задания 1)
function addNumber() {
  numbers.push(randomNumber());
  renderTable();
}

renderTable();
</script>

</body>
</html>
